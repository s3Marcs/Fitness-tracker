name: Deploy Fitness Tracker

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, linux, synology]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env exists
        run: |
          if [ ! -f .env ]; then
            echo "ERROR: .env file missing from working directory. Create it on the NAS before deploying."
            exit 1
          fi

      - name: Build images
        run: sudo docker-compose build

      - name: Deploy containers
        run: sudo docker-compose up -d